<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Up - EcoNova</title>
    <meta name="description" content="Sign up for EcoNova - Start your green journey today.">

    <link rel="icon" href="Images/growwpark_logo.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#2ECC71',
                        secondary: '#FACC15',
                        accent: '#FACC15',
                        base: '#000000',
                        cream: '#FFFFFF',
                        warmgray: '#9CA3AF',
                        charcoal: '#111827',
                        'card-dark': '#1E293B'
                    },
                    animation: { 'fadeInUp': 'fadeInUp 0.4s ease-out' },
                    keyframes: {
                        fadeInUp: {
                            'from': { opacity: '0', transform: 'translateY(20px)' },
                            'to': { opacity: '1', transform: 'translateY(0)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer components {
            .form-input { @apply w-full pl-9 pr-9 py-1.5 border bg-transparent rounded-xl focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none text-sm font-medium; }
            .social-btn { @apply flex-1 flex items-center justify-center py-1.5 border rounded-xl transition-colors duration-300 shadow-sm; }
            .input-icon { @apply absolute top-1/2 -translate-y-1/2 text-gray-400 left-3 text-sm; }
            .form-label { @apply block text-[var(--text-heading)] font-bold mb-0.5 text-[10px] md:text-xs uppercase tracking-wider; }
        }
    </style>
    
    <style>
        :root {
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;    
            --text-main: #4B5563;
            --text-heading: #0F172A;
            --border-color: #E2E8F0;
            --input-border: #D1D5DB;
        }
        
        [data-theme="dark"] {
            --bg-color: #020617;
            --card-bg: #1E293B;
            --text-main: #CBD5E1;
            --text-heading: #F8FAFC;
            --border-color: #334155;
            --input-border: #4B5563;
        }

        /* Enforce NO scrolling on the page */
        html, body {
            margin: 0; padding: 0; 
            height: 100vh;
            overflow: hidden; /* Locks the viewport */
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .form-input { border-color: var(--input-border); color: var(--text-main); }
        .form-input::placeholder { color: #9CA3AF; }
        .social-btn { border-color: var(--border-color); background-color: var(--card-bg); color: var(--text-heading); }
        .social-btn:hover { border-color: var(--primary); }
        .card-toggle-btn { background-color: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); }
        .card-toggle-btn:hover { color: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body class="w-full h-screen overflow-hidden m-0 p-0 antialiased relative">

    <nav class="w-full px-6 py-4 flex justify-between items-center bg-[var(--card-bg)] shadow-sm border-b border-[var(--border-color)] absolute top-0 z-50 transition-colors duration-300">
        <a href="index.html" class="flex items-center gap-2 no-underline hover:opacity-80 transition-opacity">
            <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white shrink-0 shadow-md">
                <i class="fas fa-leaf text-sm"></i>
            </div>
            <div class="text-lg font-black tracking-tight text-[var(--text-heading)] leading-none">EcoNova</div>
        </a>
        
        <div class="flex items-center gap-3 shrink-0">
            <button id="themeToggle" class="w-9 h-9 rounded-lg flex items-center justify-center transition-all duration-300 card-toggle-btn" title="Toggle Dark Mode">
                <i class="fas fa-moon text-sm" id="themeIcon"></i>
            </button>
            <button id="rtlToggle" class="w-9 h-9 rounded-lg flex items-center justify-center transition-all duration-300 card-toggle-btn" title="Toggle RTL">
                <i class="fas fa-align-right text-sm" id="rtlIcon"></i>
            </button>
        </div>
    </nav>

    <section class="flex flex-col items-center justify-center h-screen px-4 pt-16 relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-80 h-80 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute bottom-0 right-0 w-80 h-80 bg-secondary/10 dark:bg-white/5 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="w-full max-w-[380px] bg-[var(--card-bg)] rounded-3xl shadow-2xl border border-[var(--border-color)] animate-fadeInUp p-5 relative z-10 flex flex-col">
            
            <div class="mb-4 text-center">
                <h1 class="text-xl font-black text-[var(--text-heading)] mb-0.5">Create Account</h1>
                <p class="text-[var(--text-main)] opacity-80 text-[11px] font-medium">Start your green journey today</p>
            </div>

            <form id="signupFormElement" class="space-y-2.5">
                
                <div>
                    <label class="form-label" for="fullName">Full Name</label>
                    <div class="relative">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" placeholder="Jane Doe" required class="form-input" id="fullName" autocomplete="name">
                    </div>
                </div>

                <div>
                    <label class="form-label" for="signupEmail">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" placeholder="jane@earth.com" required class="form-input" id="signupEmail" autocomplete="email">
                    </div>
                </div>

                <div>
                    <label class="form-label" for="signupPassword">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="signupPassword" placeholder="Create a strong password" required class="form-input" autocomplete="new-password">
                        <button type="button" onclick="togglePasswordVisibility('signupPassword', 'signupEyeIcon')" class="absolute top-1/2 -translate-y-1/2 right-3 text-gray-400 hover:text-[var(--text-heading)] focus:outline-none cursor-pointer bg-transparent border-0 p-0 transition-colors">
                            <i class="fas fa-eye text-xs" id="signupEyeIcon"></i>
                        </button>
                    </div>
                </div>
                
                <div>
                    <label class="form-label" for="signupConfirmPassword">Confirm Password</label>
                    <div class="relative">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="signupConfirmPassword" placeholder="Repeat your password" required class="form-input" autocomplete="new-password">
                        <button type="button" onclick="togglePasswordVisibility('signupConfirmPassword', 'signupConfirmEyeIcon')" class="absolute top-1/2 -translate-y-1/2 right-3 text-gray-400 hover:text-[var(--text-heading)] focus:outline-none cursor-pointer bg-transparent border-0 p-0 transition-colors">
                            <i class="fas fa-eye text-xs" id="signupConfirmEyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-start gap-2 pt-0.5 pb-0.5">
                    <div class="flex items-center h-4 mt-0.5">
                        <input id="terms" type="checkbox" required class="w-3 h-3 text-primary rounded border-gray-300 focus:ring-primary bg-transparent cursor-pointer">
                    </div>
                    <label for="terms" class="text-[var(--text-main)] text-[9px] font-medium leading-tight cursor-pointer mt-0.5">
                        I agree to the <a href="#" class="text-primary font-bold hover:underline">Terms</a> and <a href="#" class="text-primary font-bold hover:underline">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" class="w-full bg-primary text-white hover:bg-green-600 py-2 rounded-xl font-black text-xs transition-all duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-0.5 border-0 cursor-pointer" id="signupButton">
                    Create Account
                </button>
            </form>

            <div class="mt-4">
                <div class="relative flex items-center py-1.5 mb-3">
                    <div class="flex-grow border-t border-[var(--border-color)]"></div>
                    <span class="flex-shrink-0 mx-3 text-[var(--text-main)] opacity-60 text-[9px] font-bold uppercase tracking-wider">Or continue with</span>
                    <div class="flex-grow border-t border-[var(--border-color)]"></div>
                </div>

                <div class="flex gap-2 w-full mb-3">
                    <button class="social-btn cursor-pointer" title="Sign in with Google">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-3.5 h-3.5" alt="Google">
                    </button>
                    <button class="social-btn cursor-pointer" title="Sign in with Facebook">
                        <i class="fab fa-facebook text-[#1877F2] text-base"></i>
                    </button>
                    <button class="social-btn cursor-pointer" title="Sign in with Apple">
                        <i class="fab fa-apple text-[var(--text-heading)] text-base"></i>
                    </button>
                </div>

                <p class="text-center text-[10px] text-[var(--text-main)] font-medium">
                    Already a member? 
                    <a href="login.html" class="text-primary font-bold hover:underline ml-1">Log In</a>
                </p>
            </div>
        </div>
    </section>

    <script>
        // Theme Logic
        const themeToggle = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");
        const htmlElement = document.documentElement;

        function updateThemeIcon() {
            const isDark = htmlElement.classList.contains('dark');
            // Updated to text-sm to match navbar icon sizes
            if (themeIcon) themeIcon.className = isDark ? 'fas fa-sun text-sm' : 'fas fa-moon text-sm';
        }

        function toggleDarkMode() {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            htmlElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }
        if (themeToggle) themeToggle.addEventListener("click", toggleDarkMode);
        
        const savedTheme = localStorage.getItem('theme') || 'light'; 
        if (savedTheme === 'dark') {
            htmlElement.classList.add("dark");
            htmlElement.setAttribute('data-theme', 'dark');
        } else {
            htmlElement.classList.remove("dark");
            htmlElement.setAttribute('data-theme', 'light');
        }
        updateThemeIcon();

        // RTL Logic 
        const rtlToggle = document.getElementById("rtlToggle");
        const rtlIcon = document.getElementById("rtlIcon");
        
        function toggleRTL() {
            const current = htmlElement.getAttribute("dir") || "ltr";
            const next = current === "rtl" ? "ltr" : "rtl";
            htmlElement.setAttribute("dir", next);
            localStorage.setItem("direction", next);
            // Updated to text-sm to match navbar icon sizes
            if (rtlIcon) rtlIcon.className = next === 'rtl' ? 'fas fa-align-left text-sm' : 'fas fa-align-right text-sm';
        }
        if (rtlToggle) rtlToggle.addEventListener("click", toggleRTL);
        
        if (localStorage.getItem("direction") === "rtl") {
            htmlElement.setAttribute("dir", "rtl");
            if (rtlIcon) rtlIcon.className = 'fas fa-align-left text-sm';
        }

        // Form Logic
        document.getElementById('signupFormElement').addEventListener('submit', function(e) {
            e.preventDefault();
            const pwd = document.getElementById('signupPassword').value;
            const confirmPwd = document.getElementById('signupConfirmPassword').value;
            
            if (pwd !== confirmPwd) {
                alert("Passwords do not match!");
                return;
            }

            const btn = document.getElementById('signupButton');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Creating...';
            setTimeout(() => {
                alert('Account created successfully!');
                window.location.href = 'user-dashboard.html';
            }, 1500);
        });

        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
