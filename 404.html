                        'float': 'float 6s infinite ease-in-out',

    <style>
        :root {
            /* Light Mode Variables - EcoNova */
            --primary-color: #2ECC71; 
            --secondary-color: #FACC15; 
            --accent-color: #FACC15;
            
            --bg-color: #FFFFFF;
            --bg-alt: #F9FAFB;
            --card-bg: #FFFFFF;    
            --text-main: #1F2937;
            --text-heading: #000000;
            --border-color: #E5E7EB;
        }
        
        [data-theme="dark"] {
            /* Dark Mode Variables - EcoNova */
            --primary-color: #2ECC71;      
            --secondary-color: #FACC15;
            --accent-color: #FACC15;     
            
            --bg-color: #0A0A0A; 
            --bg-alt: #141414;   
            --card-bg: #1E1E1E;  
            
            --text-main: #E5E7EB;
            --text-heading: #FFFFFF;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .bg-theme-main { background-color: var(--bg-color); }
        .bg-card-theme { background-color: var(--card-bg); }
        .text-heading-theme { color: var(--text-heading) !important; }
        .text-body-theme { color: var(--text-main) !important; }
        .border-theme { border-color: var(--border-color) !important; }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Base Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .float-animation {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        /* Nav Icon Buttons styling matched to EcoNova */
        .nav-icon-btn {
            background-color: rgba(46, 204, 113, 0.1); 
            color: var(--text-heading);
        }
        [data-theme="dark"] .nav-icon-btn {
            background-color: rgba(250, 204, 21, 0.1); 
            color: var(--text-heading);
        }

        /* Scrollbar aesthetics */
        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb { background-color: #2ECC71; border-radius: 20px; opacity: 0.8; }
        .dark body::-webkit-scrollbar-thumb { background-color: #374151; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">

        <button class="w-10 h-10 nav-icon-btn rounded-xl flex items-center justify-center transition-all duration-300 hover:bg-primary hover:text-white shrink-0 border border-theme shadow-lg cursor-pointer" id="desktop-rtl-toggle-btn" title="Toggle RTL">

            <p class="text-lg text-body-theme opacity-80 mb-10 fade-in max-w-md mx-auto leading-relaxed" style="animation-delay: 0.4s;">

    <div class="py-6 text-center text-xs text-body-theme opacity-60 fade-in" style="animation-delay: 0.8s;">

    <div class="absolute top-0 left-0 w-64 h-64 bg-primary/20 rounded-full blur-[100px] -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-accent/10 dark:bg-white/5 rounded-full blur-[120px] translate-x-1/3 translate-y-1/3 pointer-events-none"></div>

    <script>
        const htmlElement = document.documentElement;
        const desktopThemeToggleBtn = document.getElementById('desktop-theme-toggle-btn');
        const desktopThemeIcon = document.getElementById('desktop-theme-icon');
        const desktopRtlToggleBtn = document.getElementById('desktop-rtl-toggle-btn');

        // Initialize Theme from LocalStorage
        const currentTheme = localStorage.getItem('theme') || 'light';
        htmlElement.setAttribute('data-theme', currentTheme);
        if (currentTheme === 'dark') {
            htmlElement.classList.add('dark');
            if (desktopThemeIcon) desktopThemeIcon.className = 'fas fa-sun';
        }

        // Toggle Theme Logic
        function toggleTheme() {
            const isDark = htmlElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            if (newTheme === 'dark') {
                htmlElement.classList.add('dark');
            } else {
                htmlElement.classList.remove('dark');
            }
            
            if (desktopThemeIcon) {
                desktopThemeIcon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
        }

        if (desktopThemeToggleBtn) {
            desktopThemeToggleBtn.addEventListener('click', toggleTheme);
        }

        // Initialize RTL from LocalStorage
        const currentDir = localStorage.getItem('direction') || 'ltr';
        htmlElement.setAttribute('dir', currentDir);

        // Toggle RTL Logic
        function toggleRTL() {
            const direction = htmlElement.getAttribute('dir') === 'rtl' ? 'ltr' : 'rtl';
            htmlElement.setAttribute('dir', direction);
            localStorage.setItem('direction', direction);
        }
        
        if (desktopRtlToggleBtn) {
            desktopRtlToggleBtn.addEventListener('click', toggleRTL);
        }
    </script>
</body>
</html>
